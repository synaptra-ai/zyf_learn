name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: 测试
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: booknest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U test -d booknest_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            booknest/frontend/package-lock.json
            booknest/backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd booknest/backend
          npm ci

      - name: Prepare test database
        run: |
          cd booknest/backend
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test

      - name: Test Backend
        run: |
          cd booknest/backend
          npm test -- --runInBand
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test

      - name: Backend Lint and OpenAPI
        run: |
          cd booknest/backend
          npm run lint
          npm run openapi:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test

      - name: Install frontend dependencies
        run: |
          cd booknest/frontend
          npm ci

      - name: Frontend Build and Tests
        run: |
          cd booknest/frontend
          npm run build
          npx vitest run --passWithNoTests
        env:
          VITE_API_URL: http://localhost:4000/api/v1

  # Job 2: 部署 (仅 main 分支)
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e

            cd /home/deploy/booknest
            git fetch origin main
            git reset --hard origin/main

            cat > booknest/.env <<EOF
            DB_USER=booknest
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=booknest
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DOMAIN=139.224.246.39
            EOF

            cd booknest

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=100 backend

            for i in {1..30}; do
              if curl -f http://localhost:4000/health; then
                echo "Backend healthy"
                break
              fi
              echo "Waiting for backend..."
              sleep 2
            done

            curl -f http://localhost:4000/health || exit 1
            docker image prune -f

      - name: Verify Deployment
        run: |
          curl -f http://139.224.246.39/health || exit 1
          echo "Deployment successful!"