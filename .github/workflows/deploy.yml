name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: 测试
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: booknest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d booknest_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            booknest/frontend/package-lock.json
            booknest/backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd booknest/backend
          npm ci

      - name: Prepare test database
        run: |
          cd booknest/backend
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test

      - name: Test Backend
        run: |
          cd booknest/backend
          npm test -- --runInBand
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test
          MOCK_PAYMENT_SECRET: mock-payment-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Backend Lint and OpenAPI
        run: |
          cd booknest/backend
          npm run lint
          npm run openapi:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/booknest_test
          JWT_SECRET: test-secret
          PORT: 4000
          NODE_ENV: test

      - name: Install frontend dependencies
        run: |
          cd booknest/frontend
          npm ci --legacy-peer-deps

      - name: Frontend Build and Tests
        run: |
          cd booknest/frontend
          npm run lint
          npm run api:types:local
          npm run build
          npx vitest run --passWithNoTests
        env:
          VITE_API_URL: http://localhost:4000/api/v1

  # Job 2: 部署 (仅 main 分支 push)
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e

            echo "=== Deploy started ==="
            whoami
            pwd
            docker --version
            docker compose version

            cd /home/deploy/booknest
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            cd booknest

            cat > .env <<'ENVEOF'
            DB_USER=booknest
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=booknest
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DOMAIN=${{ secrets.ECS_HOST }}
            ENVEOF

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Container status ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== Backend logs ==="
            docker compose -f docker-compose.prod.yml logs --tail=100 backend

            echo "=== Waiting for backend health ==="
            for i in {1..30}; do
              if curl -f http://localhost:4000/health; then
                echo "Backend healthy"
                break
              fi
              echo "Waiting for backend... $i"
              sleep 2
            done

            curl -f http://localhost:4000/health
            curl -f http://localhost/health

            docker image prune -f

            echo "=== Deploy successful ==="
