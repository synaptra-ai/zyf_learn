name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  # 我们直接定义 deploy 任务，不再定义 test 任务
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: deploy
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 开始部署..."
            cd /home/deploy/booknest/booknest
            git pull origin main
            
            echo "🐳 重启 Docker 容器..."
            # 这里假设你用的是 docker-compose，如果是纯 docker 命令请自行调整
            docker compose down
            docker compose up -d --build
            
            echo "✅ 部署完成！"
